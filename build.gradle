plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.h2database:h2:2.2.224'
    implementation 'org.flywaydb:flyway-core:9.22.3'
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}

task runQuery(type: JavaExec) {
    group = 'Execution'
    description = 'Runs DatabaseQueryService'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.example.DatabaseQueryService'
}

task runClientService(type: JavaExec) {
    group = 'Execution'
    description = 'Runs ClientService tests'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.example.ClientService'
}